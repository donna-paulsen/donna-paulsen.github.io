<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 720px; padding: 2rem; text-align: center; }
        h1 { font-size: 2rem; color: #f0f6fc; margin-bottom: 0.5rem; }
        p { color: #8b949e; margin-bottom: 2rem; }
        .reports { text-align: left; }
        .reports a { display: block; padding: 0.75rem 1rem; margin: 0.5rem 0; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #58a6ff; text-decoration: none; transition: border-color 0.2s; }
        .reports a:hover { border-color: #58a6ff; }
        .empty { color: #484f58; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Analysis Hub</h1>
        <p>Dave's collection of analyses, reports, and deep dives.</p>
        <div class="reports">
            <p class="empty">No reports yet. They'll show up here as we build them.</p>
        </div>
    </div>
</body>
</html>
